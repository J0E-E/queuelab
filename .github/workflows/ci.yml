name: CI

# Portfolio-grade gates: the backend and frontend suites must be green on every push and PR.
# The end-to-end narrative (Playwright) runs once Epic 19 wires a serve-able stack — see the
# `e2e` job, which is intentionally not yet gating.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff check app tests
          uv run ruff format --check app tests

      # The integration suite spins its own ephemeral Redis/Postgres via testcontainers, using the
      # runner's Docker daemon — no GitHub service containers needed.
      - name: Test
        run: uv run pytest -q

  worker:
    name: worker (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test
        run: uv run pytest -q

  frontend:
    name: frontend (eslint + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:run

  # End-to-end narrative (submit -> break -> recover -> scale). The Playwright spec and config ship
  # now (frontend/e2e), but the live run needs a serve-able stack — the uvicorn api command, a
  # frontend service, and nginx — which Epic 19 wires. This job is the placeholder for that; it is
  # skipped until then so a green-but-not-yet-runnable narrative never blocks the gating suites.
  e2e:
    name: e2e (playwright narrative)
    runs-on: ubuntu-latest
    if: ${{ false }} # TODO(Epic 19): enable once the Compose stack serves the app end to end.
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Bring up the stack
        working-directory: .
        run: docker compose up -d --build

      - name: Run the narrative
        run: npm run e2e
