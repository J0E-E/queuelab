# Alembic configuration for the QueueLab backend.
#
# The database URL is intentionally NOT set here — env.py reads it from app.config
# settings (which honor DATABASE_URL / the .env file), so there is one source of truth.

[alembic]
# Migration scripts live next to this file.
script_location = alembic
# Revision filenames lead with the revision id; the initial migrations hand-set it to a
# zero-padded counter (0001, 0002, ...) for readable ordering.
file_template = %%(rev)s_%%(slug)s
# Treat naive timestamps as UTC when rendering Create Date in new revisions.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
