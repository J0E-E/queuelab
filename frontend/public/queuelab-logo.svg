<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  width="64"
  height="64"
  role="img"
  aria-label="QueueLab logo"
  shape-rendering="crispEdges"
>
  <title>QueueLab</title>
  <!-- Near-black phosphor field (Guide §3.1 --color-bg). Hard corners, no radius (Guide §6). -->
  <rect x="0" y="0" width="64" height="64" fill="#0a0a0a" />

  <!-- Faint CRT scanlines (Guide §9): full-bleed, decorative, low opacity. -->
  <g fill="#33ff00" opacity="0.1">
    <rect x="0" y="17" width="64" height="1" />
    <rect x="0" y="31" width="64" height="1" />
    <rect x="0" y="45" width="64" height="1" />
  </g>

  <!-- Bracket frame [ ] — QueueLab's signature monogram framing (Guide §4.2, title bars). -->
  <g fill="#33ff00">
    <!-- left bracket "[" -->
    <rect x="12" y="16" width="4" height="32" />
    <rect x="12" y="16" width="10" height="4" />
    <rect x="12" y="44" width="10" height="4" />
    <!-- right bracket "]" -->
    <rect x="48" y="16" width="4" height="32" />
    <rect x="42" y="16" width="10" height="4" />
    <rect x="42" y="44" width="10" height="4" />

    <!-- Queue-depth bars [ ▆▄▂ ] — the Guide's signature data-viz (§8), draining left-to-right. -->
    <rect x="22" y="26" width="20" height="4" />
    <rect x="22" y="33" width="14" height="4" />
    <rect x="22" y="40" width="8" height="4" />
  </g>
</svg>
